<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Auth & Profile System</title>
    
    <!-- Redirection check before rendering UI to avoid screen flash -->
    <script>
        if (localStorage.getItem('session_token')) {
            window.location.href = 'profile.html';
        }
    </script>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- Main Content Container -->
    <main class="container my-auto">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-5 text-center">
                <div class="custom-card">
                    <p class="mb-4 text-center fs-6 text-muted">hi there u can sign up or login to see about ur profile</p>

                    <div class="d-grid gap-3">
                        <a href="login.html" class="btn btn-primary btn-lg py-2">Sign In to Account</a>
                        <a href="register.html" class="btn btn-outline-secondary btn-lg py-2">Create New Account</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
